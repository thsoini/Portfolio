<html lang="en">

    <title>tommysoini.com</title>
    <link rel="stylesheet" href="styles/styles.css" />

  <body>

    <!-- Navigation -->
    <nav>
      <div class="nav-content">
        <span class="logo">&lt;tommysoini.com/&gt;</span>
        <ul class="nav-links">
          <li><a href="index.html">Frontpage</a></li>
          <li><a href="blog.html">Blog</a></li>
        </ul>

    <section id="blog">
      <div class="container">
        <div>
          <h2 class="section-title">Latest Posts</h2>
          <p class="section-subtitle">Thoughts</p>
        </div>

        <div class="blog-grid">

          <article class="blog-card"
            tabindex="0"
            role="button"
            aria-label="Read: Header"
            data-title="Header"
            data-date="March 15, 2026"
            data-read="5 min read"
            data-tags="tag,tag,tag"

              <div class="blog-meta">
                <span>
                  <svg class="icon-xs" style="display:inline;vertical-align:text-bottom" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                  </svg>
                  March 15, 2026
                </span>
                <span>•</span>
                <span>5 min read</span>
              </div>
              <h3>Header</h3>
              <p class="blog-excerpt">Text</p>
              <div class="blog-tags">
                <span class="blog-tag">tag</span>
                <span class="blog-tag">tag</span>
                <span class="blog-tag">tag</span>
              </div>

                Read more
                <svg class="icon-xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </a>
            </div>
          </article>

            tabindex="0"
            role="button"

            aria-label="Read: Header"
            data-title="Header"

                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>

                  January 20, 2026
                </span>
                <span>•</span>
                <span>10 min read</span>
              </div>

              <p class="blog-excerpt">text</p>

              <a href="#" class="read-more">

                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </a>
            </div>
          </article>

        </div>
      </div>
    </section>

    <!-- Overlay -->
    <div class="overlay-backdrop" id="overlayBackdrop" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
      <div class="overlay-panel" id="overlayPanel">
        <div class="overlay-body">
          <div class="overlay-top-row">
            <h2 class="overlay-title" id="overlayTitle"></h2>
            <button class="overlay-close" id="overlayClose" aria-label="Close post">✕</button>
          </div>
          <div class="overlay-meta-row" id="overlayMeta"></div>
          <div class="overlay-tags" id="overlayTags"></div>
          <hr class="overlay-divider" />
          <div class="overlay-content" id="overlayContent"></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="container">
        <p>© 2025 Tommy Soini</p>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
